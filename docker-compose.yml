services:
  zoa-flow-erp:
    build: .
    ports:
      - "8081:8080"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8080
      - GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json
    networks:
      - zoa-network

networks:
  zoa-network:
    name: zoa-network
    driver: bridge
